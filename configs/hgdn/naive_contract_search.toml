[base]
artifact_limit_bytes = 16000000
vocab_size = 1024
num_layers = 8
d_model = 512
attn_heads = 8
attn_kv_heads = 4
gdn_n_heads = 8
gdn_head_k_dim = 48
gdn_expand_v = 1.0
gdn_allow_neg_eigval = true
gdn_conv_size = 4
gdn_use_q_conv = true
gdn_use_k_conv = true
gdn_use_v_conv = true
gdn_use_packed_qkv_conv = true
gdn_use_packed_qkv_proj = true
gdn_conv_output_contiguous = true
gdn_q_conv_output_contiguous = true
gdn_k_conv_output_contiguous = true
gdn_v_conv_output_contiguous = true
gdn_control_proj_fp32 = false
gdn_w_g_optimizer = "matrix"
gdn_gates_fp32 = true
gdn_output_norm_fp32 = true
gdn_fla_recurrence_mode = "direct"
mlp_mult = 2.0
leaky_slope = 0.5
gdn_ratio = 1
block_pattern = ["attn", "attn", "gdn", "attn", "gdn", "attn", "attn", "attn"]
rope_base = 10000.0
qk_gain_init = 1.5
logit_softcap = 30.0
tie_embeddings = true
tied_embed_init_std = 0.005
norm_style = "pre"
residual_alpha = 1.0

[[candidates]]
name = "l8_d512_mid2_dk48_m2"
