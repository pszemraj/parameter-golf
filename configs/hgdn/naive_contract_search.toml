[base]
artifact_limit_bytes = 16000000
vocab_size = 1024
num_layers = 9
d_model = 512
attn_heads = 8
attn_kv_heads = 4
gdn_n_heads = 8
gdn_head_k_dim = 64
gdn_expand_v = 1.0
gdn_allow_neg_eigval = true
gdn_conv_size = 4
gdn_use_q_conv = true
gdn_use_k_conv = true
gdn_use_v_conv = true
gdn_use_packed_qkv_conv = true
gdn_use_packed_qkv_proj = true
gdn_conv_output_contiguous = true
gdn_q_conv_output_contiguous = true
gdn_k_conv_output_contiguous = true
gdn_v_conv_output_contiguous = true
gdn_control_proj_fp32 = false
