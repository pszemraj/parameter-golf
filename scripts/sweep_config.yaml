# sweep_config.yaml — v3: FLA-correct API, size-audited
# All combos verified ≤ 16MB at int6+zstd.
program: sweep_agent.sh
method: bayes
metric:
  name: final/val_bpb
  goal: minimize
parameters:
  # Architecture (size-critical, discrete, all audited)
  GDN_N_HEADS:
    values: [4, 8]
  GDN_HEAD_K_DIM:
    values: [32, 48]
  GDN_EXPAND_V:
    values: [1.0, 2.0]
  MLP_MULT:
    values: [2.75, 3.0, 3.25]
  GDN_RATIO:
    values: [0, 3, 7]  # 0 = pure attention control
  LEAKY_SLOPE:
    values: [0.3, 0.5]
  # Training (non-size, continuous)
  TRAIN_SEQ_LEN:
    values: [1024, 2048, 4096]
  MATRIX_LR:
    distribution: log_uniform_values
    min: 0.02
    max: 0.08
  SCALAR_LR:
    distribution: log_uniform_values
    min: 0.02
    max: 0.08
  TIED_EMBED_LR:
    distribution: log_uniform_values
    min: 0.02
    max: 0.10
  WEIGHT_DECAY:
    values: [0.0, 0.04]
  MUON_MOMENTUM:
    values: [0.95, 0.99]
  WARMDOWN_ITERS:
    values: [1200, 3500]
early_terminate:
  type: hyperband
  min_iter: 1000
  s: 2
